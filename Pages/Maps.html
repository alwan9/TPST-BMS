    <script type="module">
        import { tpst } from "./../data_list/tps.js"

        // 1. INIT MAP
        const maps = {
            default: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Base/MapServer/tile/{z}/{y}/{x}'),
            normal: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'),
            sat: L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'),
            dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png')
        };
        let baseLayer = maps.default;
        const map = L.map('map', { center: [-7.42, 109.24], zoom: 13, layers: [baseLayer], zoomControl: false });

        // 2. HEATMAP
        const heatLayer = L.heatLayer(tpst.map(t => [t.lat, t.lon, t.volume]), {
            radius: 40, blur: 25, max: 1.0, minOpacity: 0.5,
            gradient: { 0: 'blue', 0.3: 'cyan', 0.5: 'lime', 0.7: 'yellow', 0.8: 'orange', 1: 'red' }
        }).addTo(map);

        window.toggleHeatmap = () => map.hasLayer(heatLayer) ? map.removeLayer(heatLayer) : heatLayer.addTo(map);

        // 3. LOGIKA STATUS (Supaya Sinkron Marker & Sidebar)
        const getStatus = (v) => {
            if (v >= 0.7) return { label: "Penuh", color: "text-red-600", bg: "bg-red-100", hex: "#ef4444" };
            if (v >= 0.4) return { label: "Hampir Penuh", color: "text-orange-500", bg: "bg-orange-100", hex: "#f97316" };
            return { label: "Tersedia", color: "text-green-600", bg: "bg-green-100", hex: "#10b981" };
        };

        const getDistance = (lat1, lon1, lat2, lon2) => {
            const R = 6371, dLat = (lat2 - lat1) * Math.PI / 180, dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        };

        // 4. LOAD DATA (MARKER & SIDEBAR)
        const list = document.getElementById("tpstList");
        tpst.forEach(t => {
            const s = getStatus(t.volume);
            const marker = L.marker([t.lat, t.lon]).addTo(map).bindPopup(`
            <div>
                <div class="flex gap-2 items-center mb-2">
                    <img src="../images/loc.png" class="w-[20px]">
                    <div>
                        <h4 class="font-bold">${t.nama}</h4>
                        <div class="text-xs ${s.color} font-bold uppercase tracking-wider">● ${s.label} (${(t.volume * 100).toFixed(0)}%)</div>
                    </div>
                </div>
                <div class="text-[11px] text-gray-500 mb-3">${t.layanan}</div>
                <div class="flex gap-2 items-center text-gray-700">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12a9 9 0 1 1-18 0a9 9 0 0 1 18 0"/><path d="M14.5 9.25a2.5 2.5 0 1 1-5 0a2.5 2.5 0 0 1 5 0M17 19.5c-.317-6.187-9.683-6.187-10 0"/></svg> 
                    <span class="text-xs">${t.penanggung}</span>
                </div>
                <div class="flex gap-1 items-center text-gray-700 mt-1">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="m7.254 18.494l.724.423A7.95 7.95 0 0 0 12.001 20a8 8 0 1 0-8-8a7.95 7.95 0 0 0 1.084 4.024l.422.724l-.653 2.401zM2.005 22l1.352-4.968A9.95 9.95 0 0 1 2.001 12c0-5.523 4.477-10 10-10s10 4.477 10 10s-4.477 10-10 10a9.95 9.95 0 0 1-5.03-1.355zM8.392 7.308q.202-.014.403-.004q.081.006.162.016c.159.018.334.115.393.249q.447 1.015.868 2.04c.062.152.025.347-.093.537c-.06.097-.154.233-.263.372c-.113.145-.356.411-.356.411s-.099.118-.061.265c.014.056.06.137.102.205l.059.095c.256.427.6.86 1.02 1.268c.12.116.237.235.363.346c.468.413.998.75 1.57 1l.005.002c.085.037.128.057.252.11q.093.039.191.066q.036.01.073.011a.35.35 0 0 0 .295-.142c.723-.876.79-.933.795-.933v.002a.48.48 0 0 1 .378-.127q.092.004.177.04c.531.243 1.4.622 1.4.622l.582.261c.098.047.187.158.19.265c.004.067.01.175-.013.373c-.032.259-.11.57-.188.733a1.2 1.2 0 0 1-.21.302a2.4 2.4 0 0 1-.33.288q-.124.092-.125.09a5 5 0 0 1-.383.22a2 2 0 0 1-.833.23c-.185.01-.37.024-.556.014c-.008 0-.568-.087-.568-.087a9.45 9.45 0 0 1-3.84-2.046c-.226-.199-.436-.413-.65-.626c-.888-.885-1.561-1.84-1.97-2.742a3.5 3.5 0 0 1-.33-1.413a2.73 2.73 0 0 1 .565-1.68c.073-.094.142-.192.261-.305c.126-.12.207-.184.294-.228a1 1 0 0 1 .371-.1"/></svg> 
                    <span class="text-xs">${t.hp}</span>
                </div>
                <div class="flex gap-2 mt-4">
                    <button class="bg-emerald-600 text-white px-3 py-1.5 rounded-md flex gap-2 items-center text-xs hover:bg-emerald-700 transition-all" onclick="routeTo(${t.lat},${t.lon})">Navigasi</button>
                    <a href="https://wa.me/62${t.hp}" target="_blank" class="no-underline">
                        <button class="bg-zinc-100 text-zinc-700 border border-zinc-200 px-3 py-1.5 rounded-md text-xs">Hubungi</button>
                    </a>
                </div>
            </div>`);

            const div = document.createElement("div");
            div.className = "p-4 border border-slate-100 rounded-xl cursor-pointer hover:bg-slate-50 duration-200 mb-3 shadow-sm bg-white";
            div.innerHTML = `
            <div class="flex items-start justify-between">
                <div class="flex items-start gap-3">
                    <div class="p-2 ${s.bg} rounded-lg"><img src="../images/loc.png" class="w-[24px]"></div>
                    <div class="flex-1">
                        <div class="flex items-center gap-2"><b class="text-slate-800 text-sm">${t.nama}</b><span class="text-[10px] px-2 py-0.5 rounded-full font-bold ${s.bg} ${s.color}">${s.label}</span></div>
                        <p class="text-[11px] text-gray-500 mt-1">${t.layanan}</p>
                        <div class="mt-3 w-full bg-gray-100 rounded-full h-1.5 overflow-hidden"><div class="h-full rounded-full transition-all duration-500" style="width: ${t.volume * 100}%; background-color: ${s.hex}"></div></div>
                        <div class="flex justify-between items-center mt-2"><span class="text-[10px] text-gray-400 distance-text italic tracking-tighter">Menghitung jarak...</span><span class="text-[10px] font-medium text-slate-400 uppercase tracking-widest">${(t.volume * 100).toFixed(0)}% Kapasitas</span></div>
                    </div>
                </div>
                <div class="text-slate-300"><svg width="16" height="16" viewBox="0 0 1024 1024"><path fill="currentColor" d="M338.8 104.7a64 64 0 0 0 0 90.5L655.6 512L338.8 828.8a64 64 0 0 0 90.4 90.5l362.1-362a64 64 0 0 0 0-90.5l-362-362.1a64 64 0 0 0-90.5 0"/></svg></div>
            </div>`;
            div.onclick = () => { map.setView([t.lat, t.lon], 16); marker.openPopup(); };
            list.appendChild(div);
            t.textElement = div.querySelector(".distance-text");
        });

        // 5. LOCATION & ROUTING
        let userMarker, routeControl, steps = [], stepIndex = 0;
        window.getLocation = () => navigator.geolocation.getCurrentPosition(pos => {
            const { latitude: lat, longitude: lon } = pos.coords;
            if (userMarker) map.removeLayer(userMarker);
            userMarker = L.marker([lat, lon]).addTo(map).bindPopup("Lokasi Anda").openPopup();
            map.setView([lat, lon], 15);
            tpst.forEach(t => {
                const d = getDistance(lat, lon, t.lat, t.lon);
                if (t.textElement) t.textElement.innerText = d.toFixed(2) + " km dari lokasi Anda";
            });
        }, () => alert("GPS Gagal"));

        window.routeTo = (lat, lon) => {
            if (!userMarker) return alert("Aktifkan lokasi dulu");
            if (routeControl) map.removeControl(routeControl);
            routeControl = L.Routing.control({
                waypoints: [userMarker.getLatLng(), L.latLng(lat, lon)],
                lineOptions: { styles: [{ color: '#16a34a', weight: 6 }] },
                createMarker: () => null, show: false
            }).addTo(map).on("routesfound", e => {
                steps = e.routes[0].instructions; stepIndex = 0;
                document.getElementById("navPanel").classList.remove("hidden");
                updateStep();
            });
        };

        // 6. UI EXPORTS
        const updateStep = () => { if (steps.length) document.getElementById("stepText").innerText = steps[stepIndex].text + " • " + steps[stepIndex].distance + " m"; };
        window.nextStep = () => { if (stepIndex < steps.length - 1) { stepIndex++; updateStep(); } };
        window.prevStep = () => { if (stepIndex > 0) { stepIndex--; updateStep(); } };
        window.setMap = (type) => { map.removeLayer(baseLayer); baseLayer = maps[type]; baseLayer.addTo(map); };
        window.toggleSidebar = () => { const s = document.getElementById("sidebar"); s.style.display = s.style.display === "none" ? "block" : "none"; };
        window.toggleNav = () => document.getElementById("navPanel").classList.toggle("hidden");

        L.marker([-7.389, 109.285]).addTo(map).bindPopup("Lokasi Saya");
        L.circle([-7.389, 109.285], { color: 'green', fillOpacity: 0.1, radius: 5000 }).addTo(map);
    </script>
</body>


</html>
